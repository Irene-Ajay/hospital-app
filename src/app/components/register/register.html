<div class="auth-container">
  <mat-card class="auth-card">
    <mat-card-header>
      <mat-icon mat-card-avatar color="primary">person_add</mat-icon>
      <mat-card-title>Create Account</mat-card-title>
      <mat-card-subtitle>Join MediCare today</mat-card-subtitle>
    </mat-card-header>
    <mat-card-content>
      <form [formGroup]="registerForm" (ngSubmit)="register()">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Full Name</mat-label>
          <input matInput formControlName="name">
          <mat-error>Name is required (min 2 chars)</mat-error>
        </mat-form-field>
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Email</mat-label>
          <input matInput type="email" formControlName="email">
          <mat-error>Valid email is required</mat-error>
        </mat-form-field>
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Password</mat-label>
          <input matInput type="password" formControlName="password">
          <mat-error>Min 6 characters required</mat-error>
        </mat-form-field>
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Phone</mat-label>
          <input matInput formControlName="phone">
          <mat-error>Phone is required</mat-error>
        </mat-form-field>
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Date of Birth</mat-label>
          <input matInput [matDatepicker]="dob" formControlName="dob">
          <mat-datepicker-toggle matSuffix [for]="dob"></mat-datepicker-toggle>
          <mat-datepicker #dob></mat-datepicker>
        </mat-form-field>
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Blood Group</mat-label>
          <mat-select formControlName="bloodGroup">
            <mat-option *ngFor="let b of bloodGroups" [value]="b">{{ b }}</mat-option>
          </mat-select>
        </mat-form-field>
        <button mat-raised-button color="primary" type="submit"
          [disabled]="registerForm.invalid" class="submit-btn">
          Create Account
        </button>
      </form>
    </mat-card-content>
    <mat-card-actions>
      <p class="link-text">Already have an account? <a routerLink="/login">Sign in</a></p>
    </mat-card-actions>
  </mat-card>
</div>
