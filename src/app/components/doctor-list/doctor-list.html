<div class="container">
  <div class="header">
    <h1>Our Doctors</h1>
    <mat-form-field appearance="outline">
      <mat-label>Filter by Specialization</mat-label>
      <mat-select [(ngModel)]="selectedSpec">
        <mat-option *ngFor="let s of specializations" [value]="s">{{ s }}</mat-option>
      </mat-select>
    </mat-form-field>
  </div>

  <div class="doctor-grid">
    <mat-card
      *ngFor="let doctor of doctors | filterDoctor:selectedSpec"
      [appHighlight]="doctor.rating"
      class="doctor-card">
      <img mat-card-image [src]="doctor.image" [alt]="doctor.name">
      <mat-card-header>
        <mat-card-title>{{ doctor.name }}</mat-card-title>
        <mat-card-subtitle>{{ doctor.specialization }}</mat-card-subtitle>
      </mat-card-header>
      <mat-card-content>
        <p class="rating">{{ getStars(doctor.rating) }} <strong>{{ doctor.rating }}</strong></p>
        <p><mat-icon>work</mat-icon> {{ doctor.experience }} years experience</p>
        <p><mat-icon>schedule</mat-icon> {{ doctor.availability.join(', ') }}</p>
        <p class="fee"><mat-icon>payments</mat-icon> {{ doctor.fee | currency:'INR' }} per visit</p>
      </mat-card-content>
      <mat-card-actions>
        <button mat-raised-button color="primary" (click)="bookAppointment(doctor)">
          Book Appointment
        </button>
      </mat-card-actions>
    </mat-card>
  </div>
</div>
