<div class="auth-container">
  <mat-card class="auth-card">
    <mat-card-header>
      <mat-icon mat-card-avatar color="primary">login</mat-icon>
      <mat-card-title>Sign In</mat-card-title>
      <mat-card-subtitle>Access your MediCare account</mat-card-subtitle>
    </mat-card-header>
    <mat-card-content>
      <form [formGroup]="loginForm" (ngSubmit)="login()">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Email</mat-label>
          <input matInput type="email" formControlName="email" placeholder="you@example.com">
          <mat-icon matSuffix>email</mat-icon>
          <mat-error *ngIf="loginForm.get('email')?.hasError('required')">Email is required</mat-error>
          <mat-error *ngIf="loginForm.get('email')?.hasError('email')">Enter a valid email</mat-error>
        </mat-form-field>
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Password</mat-label>
          <input matInput [type]="hidePassword ? 'password' : 'text'" formControlName="password">
          <button mat-icon-button matSuffix type="button" (click)="hidePassword = !hidePassword">
            <mat-icon>{{ hidePassword ? 'visibility_off' : 'visibility' }}</mat-icon>
          </button>
          <mat-error *ngIf="loginForm.get('password')?.invalid">Password must be at least 6 characters</mat-error>
        </mat-form-field>
        <button mat-raised-button color="primary" type="submit" [disabled]="loginForm.invalid" class="submit-btn">
          Sign In
        </button>
      </form>
    </mat-card-content>
    <mat-card-actions>
      <p class="link-text">Don't have an account? <a routerLink="/register">Register here</a></p>
      <p class="demo-hint">Demo: <strong>john.doe@email.com</strong> / <strong>password123</strong></p>
    </mat-card-actions>
  </mat-card>
</div>
